<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.svg" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#009C3B" />
    <meta name="description" content="Bolão & Churras — Organize seu bolão da Copa e churrasco com os amigos. Rankings, palpites, pagamentos PIX e lista de itens em um link só." />

    <!-- Open Graph / WhatsApp -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="⚽ Bolão & Churras" />
    <meta property="og:description" content="Organize seu bolão da Copa e churrasco com os amigos. Rankings, palpites e pagamentos em um link só!" />
    <meta property="og:image" content="/og-image.png" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />

    <!-- Fontes Esportivas -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Performance: preconnect para Supabase e APIs externas -->
    <link rel="preconnect" href="https://kvgeuxferrsxiqyoouen.supabase.co">
    <link rel="dns-prefetch" href="https://kvgeuxferrsxiqyoouen.supabase.co">
    <link rel="dns-prefetch" href="https://v3.football.api-sports.io">
    <!-- Mercado Pago: Device Fingerprint (anti-fraude) -->
    <link rel="preconnect" href="https://sdk.mercadopago.com">
    <meta name="mp-public-key" content="%VITE_MP_PUBLIC_KEY%">


    <title>⚽ Bolão & Churras</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- MercadoPago.JS V2 — Device Fingerprint obrigatório (anti-fraude) -->
    <script src="https://sdk.mercadopago.com/js/v2"></script>
    <script>
      (function () {
        try {
          var mpPublicKey = document.querySelector('meta[name="mp-public-key"]')?.content;
          if (mpPublicKey && typeof MercadoPago !== 'undefined') {
            var mp = new MercadoPago(mpPublicKey);
            // O SDK grava o fingerprint automaticamente em cookie/session.
            // Expondo via window para que os componentes React possam ler.
            window.MP_DEVICE_SESSION_ID = mp.deviceFingerprint?.();
          }
        } catch (e) {
          console.warn('[MP] Device fingerprint init failed:', e);
        }
      })();
    </script>
  </body>
</html>
